# Vite + React + TypeScript App Deployment to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --force --legacy-peer-deps
        timeout-minutes: 15

      - name: Verify Rollup native modules
        run: |
          echo "Checking Rollup installation..."
          ls -la node_modules/@rollup/ | head -20
          npm list rollup @rollup/rollup-linux-x64-gnu 2>/dev/null || echo "Checking native modules..."
          node -e "require('rollup')" && echo "✅ Rollup loaded successfully"

      - name: Verify build dependencies
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          npm list --depth=0

      - name: Build app
        run: npm run build -- --base=/${{ github.event.repository.name }}/
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dist folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"
